; FaceFusion - Fast / Real-time Preset
;
; Mục tiêu: tốc độ cao nhất cho preview, webcam streaming, clip ngắn.
; Đánh đổi: chất lượng output thấp hơn balanced/high.
; Phù hợp với máy không có GPU rời / iGPU / Apple Silicon thấp.
;
; Sử dụng:
;   run.bat --quality fast
;   python facefusion.py run --config-path facefusion.fast.ini

[paths]
temp_path =
jobs_path =
source_paths =
target_path =
output_path =

[patterns]
source_pattern =
target_pattern =
output_pattern =

[face_detector]
face_detector_model = yolo_face
face_detector_size = 320x320
face_detector_margin = 0 0 0 0
face_detector_angles = 0
face_detector_score = 0.5

[face_landmarker]
face_landmarker_model = 2dfan4
face_landmarker_score = 0.5

[face_selector]
face_selector_mode = reference
face_selector_order = large-small
face_selector_age_start =
face_selector_age_end =
face_selector_gender =
face_selector_race =
reference_face_position = 0
reference_face_distance = 0.6
reference_frame_number = 0

[face_masker]
face_occluder_model = xseg_1
face_parser_model = bisenet_resnet_18
face_mask_types = box
face_mask_areas = upper-face lower-face
face_mask_regions = skin left-eyebrow right-eyebrow left-eye right-eye glasses nose mouth upper-lip lower-lip
face_mask_blur = 0.3
face_mask_padding = 0 0 0 0

[voice_extractor]
voice_extractor_model =

[frame_extraction]
trim_frame_start =
trim_frame_end =
temp_frame_format = jpg
keep_temp = false

[output_creation]
output_image_quality = 80
output_image_scale = 1.0
output_audio_encoder = aac
output_audio_quality = 80
output_audio_volume = 100
output_video_encoder = libx264
output_video_preset = veryfast
output_video_quality = 75
output_video_scale = 1.0
output_video_fps =

[processors]
processors = face_swapper

face_debugger_items = face-landmark-5 face-landmark-5/68 face-landmark-68 face-landmark-68/5 bounding-box face-detector-score face-landmarker-score face-mask age gender race

age_modifier_model = styleganex_age
age_modifier_direction = 0

deep_swapper_model =
deep_swapper_morph = 80

expression_restorer_model = live_portrait
expression_restorer_areas = upper-face lower-face mouth
expression_restorer_factor = 60

face_editor_model = live_portrait
face_editor_eyebrow_direction = 0
face_editor_eye_gaze_horizontal = 0
face_editor_eye_gaze_vertical = 0
face_editor_eye_open_ratio = 0
face_editor_lip_open_ratio = 0
face_editor_mouth_grim = 0
face_editor_mouth_pout = 0
face_editor_mouth_purse = 0
face_editor_mouth_smile = 0
face_editor_mouth_position_horizontal = 0
face_editor_mouth_position_vertical = 0
face_editor_head_pitch = 0
face_editor_head_yaw = 0
face_editor_head_roll = 0

face_enhancer_model = gfpgan_1.4
face_enhancer_blend = 50
face_enhancer_weight = 1.0

face_swapper_model = inswapper_128
face_swapper_pixel_boost = 256x256
face_swapper_weight = 1.0

frame_colorizer_model = ddcolor
frame_colorizer_blend = 100
frame_colorizer_size = 256x256

frame_enhancer_model = real_esrgan_x2
frame_enhancer_blend = 50

lip_syncer_model = wav2lip_gan_96
lip_syncer_weight = 1.0

background_remover_model = ben_2
background_remover_color = 255 255 255 255

[uis]
open_browser = true
ui_layouts = default
ui_workflow = instant_runner

[download]
download_providers = github huggingface
download_scope = lite

[benchmark]
benchmark_mode = standard
benchmark_resolutions = 540x960 720x1280
benchmark_cycle_count = 3

[execution]
execution_device_ids = 0
execution_providers = directml
execution_thread_count = 16

[memory]
video_memory_strategy = strict
system_memory_limit = 0

[misc]
log_level = info
halt_on_error = false
