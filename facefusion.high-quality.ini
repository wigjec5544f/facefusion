; FaceFusion - High Quality Preset
;
; Mục tiêu: tối đa hóa độ chân thực và độ chính xác của ảnh / video output.
; Đánh đổi: thời gian xử lý chậm hơn, dung lượng output lớn hơn, yêu cầu RAM/VRAM nhiều hơn.
;
; Sử dụng:
;   python facefusion.py run --config-path facefusion.high-quality.ini
;   python facefusion.py headless-run --config-path facefusion.high-quality.ini -s src.jpg -t tgt.mp4 -o out.mp4
;
; Có thể override từng tham số bằng CLI flag tương ứng.

[paths]
temp_path =
jobs_path =
source_paths =
target_path =
output_path =

[patterns]
source_pattern =
target_pattern =
output_pattern =

; ---------------------------------------------------------------------------
; FACE DETECTION - dùng ensemble "many" + size 640 để bắt face khó (nghiêng,
; nhỏ, mờ). angles 0,90,180,270 để xử lý ảnh xoay. score 0.5 cân bằng recall.
; ---------------------------------------------------------------------------
[face_detector]
face_detector_model = many
face_detector_size = 640x640
face_detector_margin = 0
face_detector_angles = 0 90 180 270
face_detector_score = 0.5

; ---------------------------------------------------------------------------
; FACE LANDMARKS - "many" gộp 2dfan4 + peppa_wutz, ổn định hơn dưới góc nghiêng.
; score 0.5 để loại landmark kém chất lượng.
; ---------------------------------------------------------------------------
[face_landmarker]
face_landmarker_model = many
face_landmarker_score = 0.5

[face_selector]
face_selector_mode = reference
face_selector_order = large-small
face_selector_age_start =
face_selector_age_end =
face_selector_gender =
face_selector_race =
reference_face_position = 0
reference_face_distance = 0.6
reference_frame_number = 0

; ---------------------------------------------------------------------------
; FACE MASK - dùng đồng thời box + occlusion + region để:
;   - box: vùng cơ bản theo landmark
;   - occlusion: xseg_3 (mới nhất) chống lộ tay/kính/tóc che mặt
;   - region: parser bisenet_resnet_34 để giữ chi tiết tóc, mắt, miệng
; blur 0.3 để blend mượt mép mặt, padding 0 để không cắt cằm/trán.
; ---------------------------------------------------------------------------
[face_masker]
face_occluder_model = xseg_3
face_parser_model = bisenet_resnet_34
face_mask_types = box occlusion region
face_mask_areas =
face_mask_regions = skin left-eyebrow right-eyebrow left-eye right-eye glasses nose mouth upper-lip lower-lip
face_mask_blur = 0.3
face_mask_padding = 0 0 0 0

[voice_extractor]
voice_extractor_model =

; ---------------------------------------------------------------------------
; FRAME EXTRACTION - PNG lossless để pipeline không mất chi tiết qua các stage.
; keep_temp = false để tự dọn temp sau khi xong.
; ---------------------------------------------------------------------------
[frame_extraction]
trim_frame_start =
trim_frame_end =
temp_frame_format = png
keep_temp = false

; ---------------------------------------------------------------------------
; OUTPUT - chất lượng tối đa.
;   image_quality 100, scale 1.0
;   video encoder libx264 (tương thích nhất); preset veryslow + quality 95
;     ≈ CRF rất thấp, file lớn nhưng ít block/banding.
;   Nếu có GPU NVIDIA, đổi output_video_encoder = hevc_nvenc và
;     output_video_preset = slow để tăng tốc.
;   Audio: flac (lossless). Đổi sang aac/libmp3lame nếu cần file nhỏ hơn.
; ---------------------------------------------------------------------------
[output_creation]
output_image_quality = 100
output_image_scale = 1.0
output_audio_encoder = flac
output_audio_quality = 100
output_audio_volume = 100
output_video_encoder = libx264
output_video_preset = veryslow
output_video_quality = 95
output_video_scale = 1.0
output_video_fps =

; ---------------------------------------------------------------------------
; PROCESSORS - chuỗi đề xuất cho ảnh/video chân thực nhất:
;   1. face_swapper       hoán đổi gốc, dùng pixel_boost 1024 để thuật toán
;                         làm việc trên crop độ phân giải cao thay vì 128/256
;   2. expression_restorer khôi phục biểu cảm (mắt, miệng, đầu) theo target
;                         => giảm cảm giác "mặt nạ cứng"
;   3. face_enhancer      tinh chỉnh chi tiết da, mắt, răng (gpen_bfr_2048)
;   4. frame_enhancer     khử noise + nâng nét toàn frame (clear_reality_x4),
;                         blend 50 để không "AI-painty"
;
; Nếu chỉ đổi mặt mà KHÔNG cần upscale, có thể bỏ frame_enhancer khỏi list.
; ---------------------------------------------------------------------------
[processors]
processors = face_swapper expression_restorer face_enhancer frame_enhancer

age_modifier_model = styleganex_age
age_modifier_direction = 0

background_remover_model = ben_2
background_remover_fill_color = 0 0 0
background_remover_despill_color = 0 0 0

deep_swapper_model =
deep_swapper_morph = 80

; expression_restorer factor 80 = giữ phần lớn biểu cảm gốc của target,
; full areas (cả upper + lower) để mắt/miệng tự nhiên.
expression_restorer_model = live_portrait
expression_restorer_factor = 80
expression_restorer_areas = upper-face lower-face

face_debugger_items =

face_editor_model = live_portrait
face_editor_eyebrow_direction = 0
face_editor_eye_gaze_horizontal = 0
face_editor_eye_gaze_vertical = 0
face_editor_eye_open_ratio = 0
face_editor_lip_open_ratio = 0
face_editor_mouth_grim = 0
face_editor_mouth_pout = 0
face_editor_mouth_purse = 0
face_editor_mouth_smile = 0
face_editor_mouth_position_horizontal = 0
face_editor_mouth_position_vertical = 0
face_editor_head_pitch = 0
face_editor_head_yaw = 0
face_editor_head_roll = 0

; gpen_bfr_2048: model enhancer có resolution cao nhất => giữ chi tiết da.
; blend 80 = trộn 80% kết quả enhance vào 20% gốc, tránh "plastic skin".
; weight 1.0 = full strength.
face_enhancer_model = gpen_bfr_2048
face_enhancer_blend = 80
face_enhancer_weight = 1.0

; hyperswap_1c_256: thế hệ swap mới, đặc biệt tốt khi pixel_boost cao.
; pixel_boost 1024x1024: model chạy trên crop 1024 (không phải 256) =>
;   chi tiết & độ chính xác hình học vượt trội. RAM/VRAM tăng đáng kể.
; weight 1.0 = full strength để giống source nhất.
face_swapper_model = hyperswap_1c_256
face_swapper_pixel_boost = 1024x1024
face_swapper_weight = 1.0

frame_colorizer_model = ddcolor
frame_colorizer_size = 512x512
frame_colorizer_blend = 100

; clear_reality_x4: cân bằng giữa độ sắc nét và texture tự nhiên,
;   ít artefact hơn real_esrgan. Blend 50 để không "AI-painty".
frame_enhancer_model = clear_reality_x4
frame_enhancer_blend = 50

lip_syncer_model = edtalk_256
lip_syncer_weight = 1.0

[uis]
open_browser = true
ui_layouts = default
ui_workflow = instant_runner

[download]
download_providers = github huggingface
download_scope = lite

[benchmark]
benchmark_mode = inline
benchmark_resolutions = 540p 720p 1080p
benchmark_cycle_count = 5

; ---------------------------------------------------------------------------
; EXECUTION
;   - execution_providers: để trống để facefusion auto-detect (CUDA / DirectML
;     / CoreML / CPU). Có thể fix cứng nếu muốn.
;   - thread_count: 4 cân bằng tốt cho consumer CPU; tăng lên 8-16 cho server.
; ---------------------------------------------------------------------------
[execution]
execution_device_ids = 0
execution_providers =
execution_thread_count = 4

; ---------------------------------------------------------------------------
; MEMORY
;   - video_memory_strategy = tolerant: giữ model trên VRAM giữa các frame
;     => tốc độ cao nhất. Đổi sang 'moderate' nếu thiếu VRAM,
;     'strict' nếu rất ít VRAM (sẽ chậm).
; ---------------------------------------------------------------------------
[memory]
video_memory_strategy = tolerant
system_memory_limit = 0

[misc]
log_level = info
halt_on_error = false
